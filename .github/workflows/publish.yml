name: Deploy

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
  - cron: 1 22 * * *
  - cron: 1 23 * * *
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: github.repository != 'ewjoachim/daily-writing-template'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1   # v7.0.1

    - name: Setup Pages
      id: pages
      uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

    - name: Set up UV
      id: setup-uv
      uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
      with:
        enable-cache: false

    - name: Run prek
      uses: j178/prek-action@5337cb91e0fa35a7ff31b9ca345126d8bbbcdf16   # v2.0.6

    - name: Build website
      env:
        DAILY_WRITING_SITE_URL: ${{ steps.pages.outputs.base_url }}
      run: uv run daily-writing build

    - name: Upload artifact
      uses:
        actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b       # v4.0.0
      if: github.event_name != 'pull_request'
      with:
        path: _build

  # Deployment job
  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128   # v5.0.0
