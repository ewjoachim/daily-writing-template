name: auto-setup

on:
  issues:
    types: [opened]

permissions:
  contents: write
  actions: write
  issues: write

jobs:
  auto-setup:
    if: contains(join(github.event.issue.labels.*.name, ','), 'auto-setup')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0

      - name: Parse issue body
        shell: npx -y -p @github/issue-parser node --input-type=module {0}
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          import { parseIssue } from '@github/issue-parser';
          import fs from 'node:fs';
          import path from 'node:path';

          const issueBody = process.env.ISSUE_BODY ?? '';
          const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'ISSUE_TEMPLATE', 'auto-setup.yml');
          const template = fs.readFileSync(templatePath, 'utf8');
          const parsed = parseIssue(issueBody, template);

          fs.appendFileSync(process.env.GITHUB_ENV, `ISSUE_VALUES=${JSON.stringify(parsed ?? {})}\n`);

      - name: Set up UV
        id: setup-uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          enable-cache: false

      - name: Update site configuration
        shell: uv run --with=tomlkit python {0}
        run: |
          import json
          import os
          import pathlib

          import tomlkit

          workspace = pathlib.Path()
          config_path = workspace / 'daily-writing.toml'
          document = tomlkit.parse(config_path.read_text())
          issue_values = json.loads(os.environ['ISSUE_VALUES'])
          document.update(issue_values)

          config_path.write_text(tomlkit.dumps(document))

      - name: Cleanup install script
        run: set -eux
          rm .github/ISSUE_TEMPLATE/auto-setup.yml
          rm .github/workflows/auto-setup.yml
          mv README_.md README.md

      - name: Run prek
        run: uvx prek run --show-diff-on-failure --all-files || true

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: apply auto-setup from issue" || echo "No changes to commit"
          git push

      - name: Comment on issue
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "✅ Setup complete! See the [user manual](/USER_MANUAL.md) to get started."
